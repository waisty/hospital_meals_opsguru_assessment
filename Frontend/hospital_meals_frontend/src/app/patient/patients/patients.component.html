<div class="patients-view">
  <h2>Patients</h2>
  <p class="subtitle">Manage patient records.</p>

  @if (result() === null) {
    <p class="loading">Loading…</p>
  } @else {
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Mobile</th>
            <th>Diet Type</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody>
          @for (p of items; track p.id) {
            <tr class="clickable-row" (click)="navigateToDetail(p.id)">
              <td>{{ p.name }}</td>
              <td>{{ p.mobileNumber }}</td>
              <td>{{ p.dietTypeName }}</td>
              <td class="col-actions">
                <a [routerLink]="['/patient/patients', p.id, 'edit']" class="btn-edit" title="Edit patient" (click)="$event.stopPropagation()">Edit</a>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="empty">No patients found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-pagination
      [page]="page()"
      [pageSize]="pageSize()"
      [totalCount]="totalCount"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>
