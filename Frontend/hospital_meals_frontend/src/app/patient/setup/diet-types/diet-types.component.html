<div class="setup-view">
  <header class="page-header">
    <h2>Diet Types</h2>
    @if (auth.isAdmin()) {
      <app-add-button link="/setup/diet-types/new" label="Add diet type" />
    }
  </header>

  @if (listError()) {
    <p class="error">{{ listError() }}</p>
  } @else if (loading()) {
    <p class="loading">Loading…</p>
  } @else {
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            @if (auth.isAdmin()) {
              <th class="col-actions"></th>
            }
          </tr>
        </thead>
        <tbody>
          @for (d of pagedItems(); track d.id) {
            <tr class="clickable-row" (click)="navigateToDetail(d.id)">
              <td>{{ d.id }}</td>
              <td>{{ d.name }}</td>
              @if (auth.isAdmin()) {
                <td class="col-actions">
                  <app-edit-button [link]="['/setup/diet-types', d.id, 'edit']" title="Edit diet type" [stopPropagation]="true" />
                </td>
              }
            </tr>
          } @empty {
            <tr>
              <td [attr.colspan]="auth.isAdmin() ? 3 : 2" class="empty">No diet types found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-pagination
      [page]="page()"
      [pageSize]="pageSize()"
      [totalCount]="totalCount()"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>
