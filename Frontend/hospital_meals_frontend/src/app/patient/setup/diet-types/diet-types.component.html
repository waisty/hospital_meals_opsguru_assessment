<div class="setup-view">
  <h2>Diet Types</h2>

  @if (listError()) {
    <p class="error">{{ listError() }}</p>
  } @else if (loading()) {
    <p class="loading">Loading…</p>
  } @else {
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody>
          @for (d of pagedItems(); track d.id) {
            <tr class="clickable-row" (click)="navigateToDetail(d.id)">
              <td>{{ d.id }}</td>
              <td>{{ d.name }}</td>
              <td class="col-actions">
                <a [routerLink]="['/patient/setup/diet-types', d.id, 'edit']" class="btn-edit" title="Edit diet type" (click)="$event.stopPropagation()">Edit</a>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3" class="empty">No diet types found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-pagination
      [page]="page()"
      [pageSize]="pageSize()"
      [totalCount]="totalCount()"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>
