<div class="ref-edit-view">
  @if (loading()) {
    <p class="loading">Loading…</p>
  } @else if (error() && !detail()) {
    <p class="error">{{ error() }}</p>
    <a routerLink="/patient/setup/clinical-states" class="back-link">← Back to clinical states</a>
  } @else if (detail(); as d) {
    <header class="page-header">
      <button type="button" class="back-link" (click)="backToList()">← Back to clinical states</button>
      <h2>Edit clinical state</h2>
      <p class="subtitle">{{ d.name }}</p>
    </header>

    <section class="form-card">
      <form (ngSubmit)="save()">
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <div class="form-group">
          <label for="clinical-state-name">Name</label>
          <input
            id="clinical-state-name"
            type="text"
            class="form-input"
            [ngModel]="formName()"
            (ngModelChange)="formName.set($event)"
            name="name"
            required
          />
        </div>
        <button type="submit" class="btn-save" [disabled]="saving()">
          {{ saving() ? 'Saving…' : 'Save' }}
        </button>
      </form>
    </section>
  } @else {
    <p class="error">Clinical state not found.</p>
    <a routerLink="/patient/setup/clinical-states" class="back-link">← Back to clinical states</a>
  }
</div>
