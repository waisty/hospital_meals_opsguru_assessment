<div class="setup-view">
  <h2>Clinical States</h2>

  @if (listError()) {
    <p class="error">{{ listError() }}</p>
  } @else if (loading()) {
    <p class="loading">Loading…</p>
  } @else {
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody>
          @for (c of pagedItems(); track c.id) {
            <tr class="clickable-row" (click)="navigateToDetail(c.id)">
              <td>{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td class="col-actions">
                <a [routerLink]="['/patient/setup/clinical-states', c.id, 'edit']" class="btn-edit" title="Edit clinical state" (click)="$event.stopPropagation()">Edit</a>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3" class="empty">No clinical states found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-pagination
      [page]="page()"
      [pageSize]="pageSize()"
      [totalCount]="totalCount()"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>
