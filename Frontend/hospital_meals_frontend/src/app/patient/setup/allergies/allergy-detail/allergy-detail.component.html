<div class="ref-detail-view">
  @if (loading()) {
    <p class="loading">Loading…</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
    <a routerLink="/setup/allergies" class="back-link">← Back to allergies</a>
  } @else if (detail(); as d) {
    <header class="page-header">
      <a routerLink="/setup/allergies" class="back-link">← Back to allergies</a>
      <div class="header-row">
        <h2>Allergy details</h2>
        @if (auth.isAdmin()) {
          <app-edit-button [link]="['/setup/allergies', d.id, 'edit']" />
        }
      </div>
      <p class="subtitle">{{ d.name }}</p>
    </header>

    <section class="info-card">
      <h3>Details</h3>
      <dl class="info-list">
        <dt>ID</dt>
        <dd>{{ d.id }}</dd>
        <dt>Name</dt>
        <dd>{{ d.name }}</dd>
      </dl>
    </section>
  } @else {
    <p class="error">Allergy not found.</p>
    <a routerLink="/setup/allergies" class="back-link">← Back to allergies</a>
  }
</div>
