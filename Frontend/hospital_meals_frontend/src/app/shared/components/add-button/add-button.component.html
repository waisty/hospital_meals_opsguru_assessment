@if (link(); as route) {
  <a [routerLink]="route" class="add-btn">
    <i class="fas fa-plus" aria-hidden="true"></i>
    {{ label() }}
  </a>
} @else {
  <button type="button" class="add-btn" (click)="addClick.emit()">
    <i class="fas fa-plus" aria-hidden="true"></i>
    {{ label() }}
  </button>
}
